LAYER_WIDTHS: [8192, 2048, 512, 128]
DROPOUT_RATES: [0.4, 0.3, 0.3, 0.2]
ACTIVATION: relu
NUM_TARGETS: 2

MAX_EPOCHS: 100
BATCH_SIZE_PER_GPU: 1024
LEARNING_RATE: 0.00005
WEIGHT_DECAY: 0.00001
ADAM_BETA1: 0.9
ADAM_BETA2: 0.999
LR_WARMUP_EPOCHS: 5
LR_MIN: 0.000001
LR_PLATEAU_PATIENCE: 3
LR_PLATEAU_FACTOR: 0.5
EARLY_STOPPING_PATIENCE: 10

LOSS_WEIGHTS: [0.75, 0.25]
POS_WEIGHTS: null

MASKING_START_RATIOS:
  random: 1.0
  adversarial: 0.0
  none: 0.0
MASKING_END_RATIOS:
  random: 0.33
  adversarial: 0.33
  none: 0.34
MASKING_TRANSITION_MIDPOINT_EPOCH: 12
MASKING_TRANSITION_SHAPE: sigmoid
MASKING_RANDOM_K_MIN_FRACTION: 0.5
MASKING_RANDOM_K_MAX_FRACTION: 1.0
MASKING_ADVERSARIAL_K_MIN_FRACTION: 0.3
MASKING_ADVERSARIAL_K_MAX_FRACTION: 0.7
NUM_ALWAYS_VISIBLE_FEATURES: 5

INPUT_DIM: 7048
#DATASET_PATH: data/preprocessing/full/full_cdss_dataset.parquet
# Inside your reward model config
DATASET_PATH: "data/preprocessing/reduced/reduced_cdss_dataset.parquet"
EMBEDDING_DIM: 128
DATASET_ROW_GROUP_CACHE_SIZE: 2
DATALOADER_NUM_WORKERS: 2

CHECKPOINT_DIR: data/reward_model/checkpoints
METRICS_PATH: data/reward_model/training_metrics.csv
CALIBRATION_PARAMS_PATH: data/reward_model/calibration_params.json
EXPORT_PATH: data/reward_model/frozen_model.pt
