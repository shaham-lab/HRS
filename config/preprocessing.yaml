# Preprocessing pipeline configuration for CDSS-ML
# All paths are relative to the repository root, absolute, or may use ~ for the home directory

# Path to the raw MIMIC-IV data directory
MIMIC_DATA_DIR: "~/data/physionet.org/files/mimiciv/3.1"

# Path to the MIMIC-IV clinical notes directory (mimic-iv-note module).
# Discharge and radiology notes are stored here under a note/ subdirectory.
# If omitted the pipeline falls back to MIMIC_DATA_DIR/note then MIMIC_DATA_DIR/hosp.
MIMIC_NOTE_DIR: "~/data/physionet.org/files/mimic-iv-note/2.2"

# Path to the MIMIC-IV ED module (mimic-iv-ed).
# The triage table is stored here under an ed/ subdirectory.
# If omitted the pipeline falls back to MIMIC_DATA_DIR/ed then MIMIC_DATA_DIR/hosp.
MIMIC_ED_DIR: "~/data/physionet.org/files/mimic-iv-ed/2.2"

# Train / Dev / Test split percentages (must sum to 1.0)
SPLIT_TRAIN: 0.80
SPLIT_DEV: 0.10
SPLIT_TEST: 0.10

# HuggingFace BERT model settings
BERT_MODEL_NAME: "Simonlee711/Clinical_ModernBERT"
BERT_MAX_LENGTH: 8192
# Baseline batch size for max_length=512.
# Auto-scales inversely with sequence length:
# effective = BERT_BATCH_SIZE // (BERT_MAX_LENGTH // 512).
# At BERT_MAX_LENGTH=8192 this gives effective batch size 2.
BERT_BATCH_SIZE: 32
BERT_DEVICE: "cuda"
# Set to true to force re-embedding of all features even if output parquets exist.
# Normally false — embed_features.py resumes from the last completed feature.
BERT_FORCE_REEMBED: false
# Maximum GPUs to use. null = use all GPUs SLURM allocates (recommended).
# Set to 1 to force single-GPU mode for debugging.
BERT_MAX_GPUS: null
# Admissions per GPU per SLURM job. Controls the total number of embed slices.
# With 2 GPUs and 546k admissions: ceil(546028 / (20000 * 2)) = 14 slices.
# Reduce to fit shorter partition time limits; increase on faster hardware.
BERT_SLICE_SIZE_PER_GPU: 20000
# 0-based index of the slice this job processes. Overridden by --slice-index CLI arg.
BERT_SLICE_INDEX: 0
# Rows between within-feature incremental checkpoints (fastparquet appends).
# Too small → high I/O overhead. Too large → larger re-work on a mid-job kill.
BERT_CHECKPOINT_INTERVAL: 10000

# Strategy for handling records with null hadm_id.
# "drop" (default): exclude records with null hadm_id; log count per module.
# "link": attempt to assign hadm_id by matching charttime against admission
#         windows within HADM_LINKAGE_TOLERANCE_HOURS hours.
HADM_LINKAGE_STRATEGY: "drop"
HADM_LINKAGE_TOLERANCE_HOURS: 2

# Lab event admission window.
# Integer: include only lab events within this many hours of admittime
#   (admittime <= charttime <= admittime + LAB_ADMISSION_WINDOW hours).
# "full": include all events within the full admission window
#   (admittime <= charttime <= dischtime).
# Default: 24 (first 24 hours of admission).
LAB_ADMISSION_WINDOW: 24

# ED lookback window (hours before admittime).
# Extends the lower bound of the admission window backwards to capture
# pre-admission ED labs charted before formal admittime (e.g. sepsis
# lactates, admission troponins, baseline creatinine). Applied to both
# extract_labs and extract_microbiology.
# Default: 24 hours.
ED_LOOKBACK_HOURS: 24

# Microbiology event admission window.
# Integer: include only events within this many hours of admittime
#   (admittime <= charttime <= admittime + MICRO_WINDOW_HOURS hours).
# "full_admission": include all events within the full admission window.
# Default: 72 (first 72 hours of admission).
MICRO_WINDOW_HOURS: 72

# Strategy for handling microbiology records with null hadm_id.
# "drop" (default): exclude records with null hadm_id.
# "link": attempt time-window linkage against admissions.
MICRO_NULL_HADM_STRATEGY: "drop"
MICRO_LINK_TOLERANCE_HOURS: 2

# Comment inclusion and cleaning settings for microbiology panels.
# Set to false to exclude comments entirely (not recommended — see docs).
MICRO_INCLUDE_COMMENTS: true
MICRO_COMMENT_MAX_SENTENCES: 2
MICRO_COMMENT_MAX_CHARS: 200

# Path to the lab panel configuration (generated artefact in CLASSIFICATIONS_DIR).
LAB_PANEL_CONFIG_PATH: "data/preprocessing/classifications/lab_panel_config.yaml"

# Path to the microbiology panel configuration (version-controlled config, not a generated artefact).
MICRO_PANEL_CONFIG_PATH: "config/micro_panel_config.yaml"

# Output directory roots (relative to repository root)
PREPROCESSING_DIR: "data/preprocessing"
FEATURES_DIR: "data/preprocessing/features"
EMBEDDINGS_DIR: "data/preprocessing/features/embeddings"
CLASSIFICATIONS_DIR: "data/preprocessing/classifications"

# Path to the source-file hash registry (used to skip unchanged modules).
HASH_REGISTRY_PATH: "data/preprocessing/source_hashes.json"
